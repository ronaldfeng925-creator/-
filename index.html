<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级考勤签到系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --success-color: #28a745; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: var(--primary-color); }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-checkin { background: var(--primary-color); color: white; }
        .btn-checkin:hover { background: #357abd; }
        .btn-export { background: #6c757d; color: white; margin-top: 20px; }
        #logSection { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
        .log-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; color: #555; }
        .status-tag { color: var(--success-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📝 班级考勤签到</h2>
    
    <div class="form-group">
        <label>选择姓名</label>
        <select id="nameSelect">
            <option value="">-- 请选择你的名字 --</option>
        </select>
    </div>

    <div class="form-group">
        <label>签到口令</label>
        <input type="text" id="passcode" placeholder="请输入今日签到口令">
    </div>

    <button class="btn-checkin" onclick="doCheckIn()">立即签到</button>

    <div id="logSection">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong id="countLabel">已签到人数：0</strong>
            <button class="btn-export" style="width: auto; margin: 0; padding: 5px 15px;" onclick="exportToExcel()">导出表格</button>
        </div>
        <div id="logList" style="margin-top: 10px;"></div>
    </div>
</div>

<script>
    // 提取自你上传的图片名单
    const studentList = [
        "雷卓霖", "骆德业", "冯楚棠", "敖睿翔", "黄家芮", "许索由", "莫雅淇", "冯秋衡", 
        "王子睿", "朱蕙兰", "钟祖亿", "郭思远", "陈家瑶", "林溢欣", "崔广照", "陶明轩", 
        "郑韵颖", "楼瑞晟", "张舒扬", "董圣楠", "陈昕宜", "张子健", "辜铭律", "周珈如", 
        "胡阳", "王雅雯", "谭薇薇", "王歆雅", "刘远", "王梓晨", "雷欣于", "黄嘉怡", 
        "李瑜畅", "张淼", "曹恩逸"
    ];

    // --- 设置：在这里修改口令 ---
    const CORRECT_PASSCODE = "666888"; 
    // -------------------------

    const nameSelect = document.getElementById('nameSelect');
    const logList = document.getElementById('logList');
    const checkInData = [];

    // 初始化名单
    studentList.sort().forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        nameSelect.appendChild(opt);
    });

    function doCheckIn() {
        const name = nameSelect.value;
        const inputPass = document.getElementById('passcode').value.trim();

        if (!name) return alert("请先选择你的名字！");
        if (inputPass !== CORRECT_PASSCODE) return alert("口令错误，请联系老师或管理员！");
        
        // 检查是否重复
        if (checkInData.some(item => item.姓名 === name)) {
            return alert("你已经签过到啦！");
        }

        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        const dateStr = now.toLocaleDateString();

        // 记录数据
        const record = { "姓名": name, "签到日期": dateStr, "签到时间": timeStr, "状态": "已到达" };
        checkInData.push(record);

        // 更新界面
        updateUI(name, timeStr);
        document.getElementById('passcode').value = ""; // 清空输入框
    }

    function updateUI(name, time) {
        const div = document.createElement('div');
        div.className = 'log-item';
        div.innerHTML = `<span>${name}</span><span class="status-tag">√ ${time} 已签到</span>`;
        logList.prepend(div);
        document.getElementById('countLabel').textContent = `已签到人数：${checkInData.length}`;
    }

    function exportToExcel() {
        if (checkInData.length === 0) return alert("目前还没有人签到哦！");
        
        const worksheet = XLSX.utils.json_to_sheet(checkInData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "考勤结果");
        
        // 生成文件名：2023-10-27_考勤表.xlsx
        const fileName = new Date().toLocaleDateString() + "_考勤表.xlsx";
        XLSX.writeFile(workbook, fileName);
    }
</script>

</body>
</html>
